<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SASP Live Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00e676;
      --amber:  #ffab00;
      --red:    #ff1744;
      --bg:     #0a0a0a;
      --panel:  #111214;
      --border: #1e2025;
      --text:   #c8cdd6;
      --dim:    #4a505a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 18px 14px 28px;
      gap: 14px;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      text-align: center;
      user-select: none;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--green);
      text-transform: uppercase;
    }
    header p {
      font-size: 0.72rem;
      color: var(--dim);
      margin-top: 3px;
      letter-spacing: 0.06em;
    }

    /* ── Video wrapper ───────────────────────────── */
    #wrap {
      position: relative;
      width: 100%;
      max-width: 840px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,.7);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── HUD overlaid on stream ───────────────────── */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 10px 3px 7px;
      font-size: 0.7rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.live  { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .dot.warn  { background: var(--amber); box-shadow: 0 0 7px var(--amber); }
    .dot.error { background: var(--red); }

    /* persons badge — highlight when >0 */
    #personsPill { transition: border-color .3s; }
    #personsPill.active { border-color: rgba(0,230,118,.35); }

    /* ── Stats bar below stream ──────────────────── */
    #statsBar {
      width: 100%;
      max-width: 840px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: 0.62rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      transition: color .3s;
    }
    .stat-value.hi { color: var(--green); }

    /* ── Bottom status line ──────────────────────── */
    #foot {
      width: 100%;
      max-width: 840px;
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--dim);
    }
    #connState { transition: color .3s; }
    #connState.live  { color: var(--green); }
    #connState.warn  { color: var(--amber); }
    #connState.error { color: var(--red);   }
  </style>
</head>
<body>

<header>
  <h1>SASP &mdash; Semantic Adaptive Streaming</h1>
  <p>Blurred background · Per-person sharp ROI · Real-time reconstruction</p>
</header>

<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="pill">
      <span class="dot" id="dot"></span>
      <span id="connLabel">Connecting…</span>
    </div>
    <div class="pill">
      FPS&thinsp;<span id="hudFps">—</span>
    </div>
    <div class="pill" id="personsPill">
      👤&thinsp;<span id="hudPersons">—</span>
    </div>
  </div>
</div>

<div id="statsBar">
  <div class="stat-card">
    <span class="stat-label">Receive FPS</span>
    <span class="stat-value" id="sFps">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Bandwidth</span>
    <span class="stat-value" id="sBw">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Frame latency</span>
    <span class="stat-value" id="sLat">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Persons</span>
    <span class="stat-value" id="sPersons">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Frames out (Go)</span>
    <span class="stat-value" id="sOut">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Dropped</span>
    <span class="stat-value" id="sDrop">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Clients</span>
    <span class="stat-value" id="sClients">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Go FPS</span>
    <span class="stat-value" id="sGoFps">—</span>
  </div>
</div>

<div id="foot">
  <span id="connState" class="warn">⬤ Connecting…</span>
  <span>SASP Monitor v3</span>
</div>

<script>
"use strict";

// ── Element refs ─────────────────────────────────────────────────────────────
const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const dot         = document.getElementById('dot');
const connLabel   = document.getElementById('connLabel');
const connState   = document.getElementById('connState');
const hudFps      = document.getElementById('hudFps');
const hudPersons  = document.getElementById('hudPersons');
const personsPill = document.getElementById('personsPill');

const sFps     = document.getElementById('sFps');
const sBw      = document.getElementById('sBw');
const sLat     = document.getElementById('sLat');
const sPersons = document.getElementById('sPersons');
const sOut     = document.getElementById('sOut');
const sDrop    = document.getElementById('sDrop');
const sClients = document.getElementById('sClients');
const sGoFps   = document.getElementById('sGoFps');

// ── Renderer using ImageBitmap + requestAnimationFrame ───────────────────────
// ImageBitmap decodes on the GPU compositor thread — never blocks the main
// thread and avoids the GC pressure of creating 30 Image objects/second.

let pendingBitmap = null;   // latest decoded bitmap waiting to be drawn
let renderScheduled = false;

function scheduleRender(bitmap) {
  if (pendingBitmap) pendingBitmap.close();   // discard previous undrawn frame
  pendingBitmap = bitmap;
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(renderFrame);
  }
}

function renderFrame() {
  renderScheduled = false;
  if (!pendingBitmap) return;

  const bm = pendingBitmap;
  pendingBitmap = null;

  if (canvas.width !== bm.width || canvas.height !== bm.height) {
    canvas.width  = bm.width;
    canvas.height = bm.height;
  }
  ctx.drawImage(bm, 0, 0);
  bm.close();
}

// ── Metrics ──────────────────────────────────────────────────────────────────
let rxFrames    = 0;
let rxBytes     = 0;
let latSamples  = [];   // rolling latency samples (ms)
let lastMetricT = performance.now();

function recordFrame(bytes, latencyMs) {
  rxFrames++;
  rxBytes += bytes;
  if (latSamples.length >= 60) latSamples.shift();
  latSamples.push(latencyMs);
}

setInterval(() => {
  const now     = performance.now();
  const elapsed = (now - lastMetricT) / 1000;
  const fps  = rxFrames / elapsed;
  const bwKB = rxBytes  / elapsed / 1024;
  const lat  = latSamples.length
    ? (latSamples.reduce((a,b)=>a+b,0) / latSamples.length).toFixed(0)
    : '—';

  hudFps.textContent  = fps.toFixed(1);
  sFps.textContent    = fps.toFixed(1);
  sBw.textContent     = bwKB > 1024
    ? (bwKB/1024).toFixed(2) + ' MB/s'
    : bwKB.toFixed(1) + ' KB/s';
  sLat.textContent    = lat + ' ms';

  rxFrames    = 0;
  rxBytes     = 0;
  lastMetricT = now;
}, 1000);

// ── /stats polling ────────────────────────────────────────────────────────────
async function pollStats() {
  try {
    const r = await fetch('/stats');
    const s = await r.json();

    const persons = s.avg_persons ?? '—';
    hudPersons.textContent   = persons;
    sPersons.textContent     = persons;
    personsPill.classList.toggle('active', parseInt(persons) > 0);

    sOut.textContent     = s.frames_out  ?? '—';
    sDrop.textContent    = s.dropped_frames ?? '—';
    sClients.textContent = s.active_clients ?? '—';
    sGoFps.textContent   = s.avg_fps ?? '—';

    // Highlight dropped frames in red
    sDrop.style.color = parseInt(s.dropped_frames) > 0 ? 'var(--red)' : '';
  } catch (_) { /* server might not be ready yet */ }
}
setInterval(pollStats, 1000);

// ── Status helper ─────────────────────────────────────────────────────────────
function setStatus(state) {
  const cfg = {
    connecting: { dot:'warn',  lbl:'Connecting…',   bar:'warn',  barTxt:'⬤ Connecting to WebSocket' },
    live:       { dot:'live',  lbl:'Live',           bar:'live',  barTxt:'⬤ Stream active' },
    retry:      { dot:'warn',  lbl:'Reconnecting…',  bar:'warn',  barTxt:'⬤ Reconnecting…' },
    error:      { dot:'error', lbl:'Disconnected',   bar:'error', barTxt:'⬤ Disconnected' },
  };
  const c = cfg[state] || cfg.error;
  dot.className          = 'dot ' + c.dot;
  connLabel.textContent  = c.lbl;
  connState.className    = c.bar;
  connState.textContent  = c.barTxt;
}

// ── WebSocket + auto-reconnect ────────────────────────────────────────────────
const WS_URL = `ws://${location.host}/ws`;
let   retryDelay = 500;
let   ws;

function connect() {
  setStatus('connecting');
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'blob';

  ws.onopen = () => { setStatus('live'); retryDelay = 500; };

  ws.onmessage = async (ev) => {
    const t0    = performance.now();
    const bytes = ev.data.size;

    // createImageBitmap decodes JPEG off-main-thread (GPU-accelerated in Chrome/FF)
    try {
      
      let decoding = false;

      ws.onmessage = async (ev) => {
        if (decoding) return;  // drop frame if still decoding previous
        decoding = true;
        const t0 = performance.now();
        try {
          const bitmap = await createImageBitmap(ev.data);
          recordFrame(ev.data.size, performance.now() - t0);
          scheduleRender(bitmap);
        } catch (_) {}
        decoding = false;
      };

      const lat    = performance.now() - t0;
      recordFrame(bytes, lat);
      scheduleRender(bitmap);
    } catch (_) { /* malformed frame — skip */ }
  };

  ws.onclose = () => {
    setStatus('retry');
    setTimeout(() => {
      retryDelay = Math.min(retryDelay * 1.5, 8000);
      connect();
    }, retryDelay);
  };

  ws.onerror = () => setStatus('error');
}

connect();
</script>
</body>
</html>
