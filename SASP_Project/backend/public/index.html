<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SASP Live Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00e676;
      --amber:  #ffab00;
      --red:    #ff1744;
      --bg:     #0a0a0a;
      --panel:  #111214;
      --border: #1e2025;
      --text:   #c8cdd6;
      --dim:    #4a505a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 18px 14px 28px;
      gap: 14px;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      text-align: center;
      user-select: none;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--green);
      text-transform: uppercase;
    }
    header p {
      font-size: 0.72rem;
      color: var(--dim);
      margin-top: 3px;
      letter-spacing: 0.06em;
    }

    /* ── Video wrapper ───────────────────────────── */
    #wrap {
      position: relative;
      width: 100%;
      max-width: 840px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,.7);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── HUD overlaid on stream ───────────────────── */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 10px 3px 7px;
      font-size: 0.7rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.live  { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .dot.warn  { background: var(--amber); box-shadow: 0 0 7px var(--amber); }
    .dot.error { background: var(--red); }

    /* persons badge — highlight when >0 */
    #personsPill { transition: border-color .3s; }
    #personsPill.active { border-color: rgba(0,230,118,.35); }

    /* ── Stats bar below stream ──────────────────── */
    #statsBar {
      width: 100%;
      max-width: 840px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: 0.62rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      transition: color .3s;
    }
    .stat-value.hi { color: var(--green); }

    /* ── Bottom status line ──────────────────────── */
    #foot {
      width: 100%;
      max-width: 840px;
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--dim);
    }
    #connState { transition: color .3s; }
    #connState.live  { color: var(--green); }
    #connState.warn  { color: var(--amber); }
    #connState.error { color: var(--red);   }
  </style>
</head>
<body>

<header>
  <h1>SASP &mdash; Semantic Adaptive Streaming</h1>
  <p>Blurred background · Per-subject sharp ROI · Real-time reconstruction</p>
</header>

<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="pill">
      <span class="dot" id="dot"></span>
      <span id="connLabel">Connecting…</span>
    </div>
    <div class="pill">
      FPS&thinsp;<span id="hudFps">—</span>
    </div>
    <div class="pill" id="personsPill">
      👤&thinsp;<span id="hudPersons">—</span>
    </div>
  </div>
</div>

<div id="statsBar">
  <div class="stat-card">
    <span class="stat-label">FPS In</span>
    <span class="stat-value" id="sFpsIn">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">FPS Out</span>
    <span class="stat-value" id="sFpsOut">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">BW In</span>
    <span class="stat-value" id="sBwIn">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">BW Out</span>
    <span class="stat-value" id="sBwOut">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Latency p50</span>
    <span class="stat-value" id="sLatP50">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Latency p95</span>
    <span class="stat-value" id="sLatP95">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Persons</span>
    <span class="stat-value" id="sPersons">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Dropped</span>
    <span class="stat-value" id="sDrop">—</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Clients</span>
    <span class="stat-value" id="sClients">—</span>
  </div>
</div>

<div id="foot">
  <span id="connState" class="warn">⬤ Connecting…</span>
  <span>SASP Monitor v4</span>
</div>

<script>
"use strict";

// ── Element refs ─────────────────────────────────────────────────────────────
const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const dot         = document.getElementById('dot');
const connLabel   = document.getElementById('connLabel');
const connState   = document.getElementById('connState');
const hudFps      = document.getElementById('hudFps');
const hudPersons  = document.getElementById('hudPersons');
const personsPill = document.getElementById('personsPill');

// ── Renderer using ImageBitmap + requestAnimationFrame ───────────────────────
let pendingBitmap = null;
let renderScheduled = false;

function scheduleRender(bitmap) {
  if (pendingBitmap) pendingBitmap.close();
  pendingBitmap = bitmap;
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(renderFrame);
  }
}

function renderFrame() {
  renderScheduled = false;
  if (!pendingBitmap) return;

  const bm = pendingBitmap;
  pendingBitmap = null;

  if (canvas.width !== bm.width || canvas.height !== bm.height) {
    canvas.width  = bm.width;
    canvas.height = bm.height;
  }
  ctx.drawImage(bm, 0, 0);
  bm.close();
}

// ── /api/metrics polling — server-computed metrics are ground truth ───────────
function formatBW(kb) {
  if (kb > 1024) return (kb / 1024).toFixed(2) + ' MB/s';
  return kb.toFixed(1) + ' KB/s';
}

async function pollMetrics() {
  try {
    const r = await fetch('/api/metrics');
    const envelope = await r.json();
    const s = envelope.data;

    // HUD
    hudFps.textContent     = s.fps_out.toFixed(1);
    const persons = s.persons_per_frame.toFixed(1);
    hudPersons.textContent = persons;
    personsPill.classList.toggle('active', s.persons_per_frame > 0);

    // Stats cards
    document.getElementById('sFpsIn').textContent   = s.fps_in.toFixed(1);
    document.getElementById('sFpsOut').textContent   = s.fps_out.toFixed(1);
    document.getElementById('sBwIn').textContent     = formatBW(s.bandwidth_in_kbps);
    document.getElementById('sBwOut').textContent     = formatBW(s.bandwidth_out_kbps);
    document.getElementById('sLatP50').textContent   = s.latency_p50_ms.toFixed(1) + ' ms';
    document.getElementById('sLatP95').textContent   = s.latency_p95_ms.toFixed(1) + ' ms';
    document.getElementById('sPersons').textContent  = persons;
    document.getElementById('sDrop').textContent     = s.dropped_frames;
    document.getElementById('sClients').textContent  = s.active_clients;

    // Highlight
    const dropEl = document.getElementById('sDrop');
    dropEl.style.color = s.dropped_frames > 0 ? 'var(--red)' : '';
  } catch (_) { /* server might not be ready yet */ }
}
setInterval(pollMetrics, 1000);

// ── Status helper ─────────────────────────────────────────────────────────────
function setStatus(state) {
  const cfg = {
    connecting: { dot:'warn',  lbl:'Connecting…',   bar:'warn',  barTxt:'⬤ Connecting to WebSocket' },
    live:       { dot:'live',  lbl:'Live',           bar:'live',  barTxt:'⬤ Stream active' },
    retry:      { dot:'warn',  lbl:'Reconnecting…',  bar:'warn',  barTxt:'⬤ Reconnecting…' },
    error:      { dot:'error', lbl:'Disconnected',   bar:'error', barTxt:'⬤ Disconnected' },
  };
  const c = cfg[state] || cfg.error;
  dot.className          = 'dot ' + c.dot;
  connLabel.textContent  = c.lbl;
  connState.className    = c.bar;
  connState.textContent  = c.barTxt;
}

// ── WebSocket + auto-reconnect ────────────────────────────────────────────────
const WS_URL = `ws://${location.host}/api/stream`;
let   retryDelay = 500;
let   ws;

function connect() {
  setStatus('connecting');
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'blob';

  ws.onopen = () => { setStatus('live'); retryDelay = 500; };

  ws.onmessage = async (ev) => {
    try {
      const bitmap = await createImageBitmap(ev.data);
      scheduleRender(bitmap);
    } catch (_) { /* malformed frame — skip */ }
  };

  ws.onclose = () => {
    setStatus('retry');
    setTimeout(() => {
      retryDelay = Math.min(retryDelay * 1.5, 8000);
      connect();
    }, retryDelay);
  };

  ws.onerror = () => setStatus('error');
}

connect();
</script>
</body>
</html>
